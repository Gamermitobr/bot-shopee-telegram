name: Bot Shopee Telegram
on: workflow_dispatch
jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Oferta 1 - Churrasqueira
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TOKEN }}/sendMessage" \
          -d chat_id=@robinairdraktutoriais \
          -d text="OFERTA RELÂMPAGO - CHURRASQUEIRA PORTÁTIL
          
          LINK: https://s.shopee.com.br/6ffHxillyX"
      
      - name: Espera 3 segundos
        run: sleep 3
      
      - name: Oferta 2 - Air Fryer
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TOKEN }}/sendMessage" \
          -d chat_id=@robinairdraktutoriais \
          -d text="FONE DE OUVIDO BLUETOOTH 5.1 M10
          
          LINK: https://s.shopee.com.br/40eensju9W"
      
      - name: Espera 3 segundos
        run: sleep 3
        
      - name: Oferta 3 - CARREGADOR DE BATERIA AUTOMOTIVO INTELIGENTE 12V
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TOKEN }}/sendMessage" \
          -d chat_id=@robinairdraktutoriais \
          -d text="PROMO - CARREGADOR DE BATERIA 12V
          
          LINK: https://s.shopee.com.br/5q6IzPrRmw"