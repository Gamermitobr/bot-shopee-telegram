name: Bot Shopee Telegram

on:
  schedule:
    - cron: "0 0 * * *"  # roda toda hora cheia UTC
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # v4 já usa Node 20, some o aviso

      - name: Instalar dependências
        run: npm install node-fetch@2

      - name: Rodar bot
        run: node bot.js
        env:
          TOKEN: ${{ secrets.TOKEN }}
