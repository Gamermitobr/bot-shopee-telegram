name: Bot Shopee Telegram
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install node-fetch@2
      - run: node bot.js
        env:
          TOKEN: ${{ secrets.TOKEN }}