name: Telegram Bot

on:
  schedule:
    - cron: "*/10 * * * *"  # roda a cada 10 minutos
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install feedparser requests

      - name: Rodar bot
        run: python bot.py